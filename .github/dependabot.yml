version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development
      production:
        dependency-type: production
    ignore:
      # typescript-eslint trails new TypeScript majors. Check:
      # npm view typescript-eslint peerDependencies
      - dependency-name: typescript
        versions: [">=7.0.0"]
